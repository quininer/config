# Port of Oh My Zsh theme "avit" to Starship.
# ======
# 
# Supports: Java, Node.JS, PHP, Go, Crystal, Python, Ruby, and Rust modules
# Other modules include: Directory, and Git Branch/Commit/State/Status
#
# From https://github.com/lukewhrit/dotfiles/blob/141361d24ed7da436fc2f152cf1d84bb2afc132d/.config/starship.toml

add_newline = false
format = """\
  $golang$nodejs$python$rust \
  $directory \
  $git_branch$git_state$git_status \
  $character\
"""

[character]
success_symbol = "[❯](purple)[❯](cyan)"
error_symbol = "[❯](yellow)[❯](red)"

[directory]
disabled = false
format = "[$path](bold fg:#ff79c6)"
truncate_to_repo = true

[git_status]
format = "([$all_status$ahead_behind](bold fg:#8be9fd))"
staged = "•"
modified = "~"
untracked = "+"
deleted = "x"

[git_branch]
format = "[$branch](bold fg:#8be9fd)"

# Language Support
[golang]
format = "🐭"

[nodejs]
format = "🍏"
detect_folders = [""]

[python]
format = '🐍[${pyenv_prefix}(${version})(\($virtualenv\))](bold fg:yellow)'

[rust]
format = "🦀"
